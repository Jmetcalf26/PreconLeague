services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-precon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-precon}
      POSTGRES_DB: ${POSTGRES_DB:-precon}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-precon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-precon}:${POSTGRES_PASSWORD:-precon}@db:5432/${POSTGRES_DB:-precon}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in your .env file}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SCRYFALL_USER_AGENT: ${SCRYFALL_USER_AGENT:-PreconLeague/1.0}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
